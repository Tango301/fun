<html>
<head>
  <title>hello</title>
</head>
<body>
  <h1>hi test</h1>
<h3>messages</h3>
<ul class="msg"></ul>
  <script>
    console.log('test');

let d = hello;
console.log(d);

alert('hello')
prompt('test');
function decorator(wrap, func) {
  return (...para) => {
    func(para)
    return wrap(para)
  }
}

const mylog = decorator(window.console.log, (...para)=>{
  const ul = document.querySelector(`ul[class=msg]`)
  const range = document.createRange()
  const frag = range.createContextualFragment(`<li>${para}</li>`)
  ul.append(frag)
})

mylog("Hello world!")
  </script>
</body>
</html>
